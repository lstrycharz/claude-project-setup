# claude-project-setup — Manifest
#
# This file is the brain of the claude-init script. It maps "project types"
# (the kinds of work you actually do) to the assets that should be
# copied into a new project's .claude/ folder when you bootstrap it.
#
# The four project types below are starting examples — they're shaped to
# cover the most common kinds of work across creative, HR, analytics, and
# similar teams. Edit them, rename them, or add new ones to match your
# team's vocabulary and work patterns. Remove anything you don't use.
#
# Paths are relative to the claude-project-setup root.

# -----------------------------------------------------------------------------
# Global assets — installed for EVERY project regardless of type
# -----------------------------------------------------------------------------
global:
  references:
    - references/global/general-rules.md
  templates:
    - templates/claude-md-starter.md
  skills: []
  plugins: []

# -----------------------------------------------------------------------------
# Project types
# -----------------------------------------------------------------------------
project_types:

  recurring_report:
    name: "Recurring Report"
    description: "A report you produce on a regular cadence — monthly, quarterly, weekly. Same structure each time, different data."
    references:
      - references/recurring-report/report-rules.md
      - references/recurring-report/visualization-rules.md
    templates:
      - templates/prd-template.md
      - templates/spec-template.md
    checklists:
      - references/recurring-report/report-checklist.md
    skills: []
    plugins: []
    notes: "Use for any cyclical reporting work — analytics dashboards, hiring funnel reviews, campaign performance recaps, etc."

  multi_asset_project:
    name: "Multi-Asset Project"
    description: "A project producing multiple linked deliverables that need shared voice, framing, and conventions."
    references:
      - references/multi-asset-project/voice-and-standards.md
      - references/multi-asset-project/asset-coordination-rules.md
    templates:
      - templates/prd-template.md
      - templates/spec-template.md
      - templates/workplan-template.md
    checklists:
      - references/multi-asset-project/multi-asset-checklist.md
    skills: []
    plugins: []
    notes: "Use when one project produces several related outputs — e.g. a campaign with brief + email + landing page, or a policy rollout with handbook + comms + FAQ."

  research_analysis:
    name: "Research / Analysis"
    description: "A project that synthesizes multiple sources into a coherent view — competitive landscape, deep-dive analysis, ad-hoc business question."
    references:
      - references/research-analysis/research-rules.md
    templates:
      - templates/prd-template.md
      - templates/workplan-template.md
    checklists:
      - references/research-analysis/research-checklist.md
    skills: []
    plugins: []
    notes: "Use for one-time research or analysis — competitive scans, people-analytics deep dives, market sizing, customer-segment analysis."

  strategic_initiative:
    name: "Strategic Initiative"
    description: "A larger planning project that benefits from explicit why/what/how structure (PRD, Spec, Work Plan)."
    references:
      - references/strategic-initiative/planning-rules.md
    templates:
      - templates/prd-template.md
      - templates/spec-template.md
      - templates/workplan-template.md
    checklists: []
    skills: []
    plugins: []
    notes: "Use for bigger strategy work — campaign strategy, organizational redesign, data-strategy roadmaps, framework redesigns, etc."

# -----------------------------------------------------------------------------
# Note on code projects:
#
# Code projects are handled by the separate `claude-setup` repo (init-claude),
# which has hooks, secret scanning, slash commands, and PROGRESS.md memory
# tailored to software work. Don't add a `code` project type here — keep the
# boundary clean. If you need a quick scripting scratchpad, use init-claude.
# -----------------------------------------------------------------------------
